name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/order-worker.js
      - wrangler.toml
      - .github/workflows/deploy-cloudflare-worker.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN is not set"
            exit 1
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is not set"
            exit 1
          fi

      - name: Deploy Worker
        run: |
          set -o pipefail
          npm exec --yes wrangler@4.85.0 -- deploy 2>&1 | tee wrangler-deploy.log

          worker_url=$(grep -Eo 'https://[^ ]+\.workers\.dev' wrangler-deploy.log | tail -n 1 || true)

          if [ -z "$worker_url" ]; then
            echo "Worker URL not found in deploy output"
            exit 1
          fi

          echo "WORKER_URL=$worker_url" >> "$GITHUB_ENV"
          echo "Deployed Worker URL: $worker_url"

      - name: Publish Worker URL
        if: success()
        run: |
          echo "## Cloudflare Worker" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$WORKER_URL" >> "$GITHUB_STEP_SUMMARY"
