name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/order-worker.js
      - wrangler.toml
      - .github/workflows/deploy-cloudflare-worker.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: bkparfume-order

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN is not set"
            exit 1
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is not set"
            exit 1
          fi

      - name: Deploy Worker
        id: deploy_worker
        continue-on-error: true
        run: |
          set -o pipefail
          npm exec --yes wrangler@4.85.0 -- deploy 2>&1 | tee wrangler-deploy.log

      - name: Resolve account workers.dev subdomain
        id: resolve_account_subdomain
        if: always()
        continue-on-error: true
        run: |
          account_subdomain=$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => { const json = JSON.parse(data); if (!json.success || !json.result?.subdomain) process.exit(1); process.stdout.write(json.result.subdomain); });")

          echo "ACCOUNT_SUBDOMAIN=$account_subdomain" >> "$GITHUB_ENV"

      - name: Verify Worker workers.dev availability
        id: verify_worker_subdomain
        if: always()
        continue-on-error: true
        run: |
          script_enabled=$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$WORKER_NAME/subdomain" \
            | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => { const json = JSON.parse(data); if (!json.success || typeof json.result?.enabled !== 'boolean') process.exit(1); process.stdout.write(String(json.result.enabled)); });")

          if [ "$script_enabled" != "true" ]; then
            echo "workers.dev subdomain is not enabled for $WORKER_NAME"
            exit 1
          fi

      - name: Build Worker URL
        id: build_worker_url
        if: always() && env.ACCOUNT_SUBDOMAIN != ''
        continue-on-error: true
        run: |
          worker_url="https://$WORKER_NAME.$ACCOUNT_SUBDOMAIN.workers.dev"

          echo "WORKER_URL=$worker_url" >> "$GITHUB_ENV"
          echo "Deployed Worker URL: $worker_url"

      - name: Publish deploy diagnostics
        if: always()
        run: |
          echo "## Cloudflare Worker deploy diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy step outcome: ${{ steps.deploy_worker.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Resolve subdomain outcome: ${{ steps.resolve_account_subdomain.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Verify workers.dev outcome: ${{ steps.verify_worker_subdomain.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Build URL outcome: ${{ steps.build_worker_url.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f wrangler-deploy.log ]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 wrangler-deploy.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "wrangler-deploy.log was not created." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish Worker URL
        if: success() && env.WORKER_URL != ''
        run: |
          echo "## Cloudflare Worker" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$WORKER_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if deploy failed
        if: always() && (steps.deploy_worker.outcome != 'success' || steps.resolve_account_subdomain.outcome != 'success' || steps.verify_worker_subdomain.outcome != 'success' || steps.build_worker_url.outcome != 'success')
        run: exit 1
